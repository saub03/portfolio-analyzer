<!-- templates/email_template.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: sans-serif; padding: 20px;">
    <h2>🤖 오늘의 AI 시황 브리핑</h2>
    <!-- 단순 텍스트 변수 삽입 -->
    <p style="background-color: #f4f4f4; padding: 15px; border-radius: 8px;">
        {{ ai_summary }}
    </p>

    <h2>📊 포트폴리오 현황</h2>
    <table border="1" style="border-collapse: collapse; width: 100%; text-align: center;">
        <tr style="background-color: #eeeeee;">
            <th>종목명</th>
            <th>현재가</th>
            <th>수익률</th>
        </tr>
        
        <!-- for문: 파이썬의 리스트를 순회하며 표의 행(tr)을 반복 생성 -->
        {% for item in portfolio_list %}
        <tr>
            <td>{{ item.name }}</td>
            <td>{{ item.price }}</td>
            
            <!-- if문: 수익률이 0보다 크면 빨간색, 아니면 파란색으로 표시 -->
            <td style="color: {% if item.return > 0 %}red{% else %}blue{% endif %}; font-weight: bold;">
                {{ item.return }}%
            </td>
        </tr>
        {% endfor %}
    </table>

    <h2>📰 관련 종목 뉴스</h2>
    <ul>
        {% for news in news_list %}
        <li><a href="{{ news.link }}">{{ news.title }}</a></li>
        {% endfor %}
    </ul>
</body>
</html>
